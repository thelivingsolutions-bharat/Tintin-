name: Compile Windows Executable

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python Workspace
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Trading Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pyinstaller pandas numpy xlwings

    - name: Compile App with PyInstaller
      run: |
        pyinstaller --noconsole --onefile app.py

    - name: Upload Finished Executable to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: QuantOptionPro-App
        path: dist/app.exe
